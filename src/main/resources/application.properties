spring.application.name=task-manager

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/task_manager_db}
spring.datasource.username=${DATABASE_USERNAME:saad}
spring.datasource.password=${DATABASE_PASSWORD:saad}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JSP Config
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp